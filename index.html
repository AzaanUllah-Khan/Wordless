<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordless - A Manually Code Game After Eternity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <nav>
            <h1>Wordless</h1>
            <div class="gp1">
                <i class="fa fa-bars"></i>
            </div>
            <div class="gp2">
                <i class="fa-solid fa-question"></i>
                <i class="fa-regular fa-calendar"></i>
                <i class="fa fa-bars"></i>
                <p>Sign In</p>
            </div>
        </nav>
    </header>
    <main>
        <div class="game">
            <div class="tries">
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
                <div class="row">
                    <div class="letter b1"></div>
                    <div class="letter b2"></div>
                    <div class="letter b3"></div>
                </div>
            </div>
            <div class="down">
                <div class="count">
                    <button id="dec" disabled onclick="decrease()">-</button>
                    <input type="text" disabled id="inp">
                    <button id="inc" onclick="increase()">+</button>
                </div>
                <div class="reset">
                    <button onclick="reset()" id="reset">Reset</button>
                </div>
            </div>
        </div>
    </main>
    <div class="filter" id="filter"></div>
    <div class="result" id="solved">
        <h1>Puzzle Solved</h1>
        <div class="word" id="popupword"></div>
        <span id="tryNum">Solved In 3 Guesses</span>
        <span id="timer"></span>
        <button onclick="nextRound()">Next Level</button>
    </div>
    <div class="result" id="unsolved">
        <h1>Puzzle Failed</h1>
        <div class="word" id="popupword2"></div>
        <span id="timer2"></span>
        <button onclick="reset()">Try Again</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
